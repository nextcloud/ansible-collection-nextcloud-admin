---
# defaults file for upgrade

# WARNING: this role defaults `nextcloud_webroot` to to `/opt/nextcloud` and `nextcloud_websrv_user` to `www-data`.
# Please change these values if not the same in your installation.

nextcloud_webroot: "/opt/nextcloud"
nextcloud_websrv_user: "www-data"

# If not set, `nextcloud_initial_version` will be auto-detected from the installed instance.
# nextcloud_initial_version: '{{ nextcloud_upgrade_path | first }}'

nextcloud_target_version: '{{ nextcloud_upgrade_path | last }}'

# Enables automatic PHP version upgrade using geerlingguy.php-versions and geerlingguy.php roles.
# When needed, upgrades PHP to a version compatible with both current and target Nextcloud versions.
# The role will try to install a version available in your distribution's official repositories
# (see `vars/` folder), before opting for the latest compatible version (that may need a third-party repo).
# WARNING: This will:
#   - Uninstall all existing PHP versions except the target version
#   - Add/remove third-party repositories for the target PHP version, as needed
#   - Stop web server and cron services during PHP version upgrade
# IMPORTANT:
#   - Use the same PHP configuration variables as your initial Nextcloud installation.
#   - This is for APT-based systems only.
# More information:
#   - https://github.com/geerlingguy/ansible-role-php
#   - https://github.com/geerlingguy/ansible-role-php-versions
nextcloud_upgrade_php: false

# List of all supported PHP versions per Nextcloud major release.
# Based on: https://github.com/nextcloud/server/wiki/Releases-and-PHP-versions
nextcloud_php_requirements:
  '20': ['7.2', '7.3', '7.4']
  '21': ['7.3', '7.4', '8.0']
  '22': ['7.3', '7.4', '8.0']
  '23': ['7.3', '7.4', '8.0']
  '24': ['7.4', '8.0', '8.1']
  '25': ['7.4', '8.0', '8.1']
  '26': ['8.0', '8.1', '8.2']
  '27': ['8.0', '8.1', '8.2']
  '28': ['8.0', '8.1', '8.2', '8.3']
  '29': ['8.0', '8.1', '8.2', '8.3']
  '30': ['8.1', '8.2', '8.3']
  '31': ['8.1', '8.2', '8.3', '8.4']
  '32': ['8.1', '8.2', '8.3', '8.4']
  '33': ['8.2', '8.3', '8.4', '8.5']

# Set to `true` to skip PostgreSQL version check (therefore, no upgrade either). Use at your own risk!
# You may want to toggle this if you use a different DBMS.
nextcloud_skip_postgresql: false

# Enables automatic PostgreSQL version upgrade using geerlingguy.postgresql role and community.postgresql collection.
# When needed, upgrades PostgreSQL to a version compatible with both current and target Nextcloud versions.
# The role will try to install a version available in your distribution's official repositories
# (see `vars/` folder), before opting for the latest compatible version (that may need a third-party repo).
# WARNING: This will:
#   - Uninstall all existing PostgreSQL versions
#   - Add/remove third-party repositories for the target PostgreSQL version, as needed
#   - Stop web server and cron services during PostgreSQL version upgrade
#   - Dump/restore the Nextcloud database, leaving a copy of the database prior to the upgrade in `/tmp`.
# IMPORTANT:
#   - Use the same PostgreSQL configuration variables as your initial Nextcloud installation.
#   - This is for APT-based systems only.
# More information:
#   - https://github.com/geerlingguy/ansible-role-postgresql
nextcloud_upgrade_postgresql: false

# Nextcloud database name in PostgreSQL.
# Please change this value if not the same in your installation.
nextcloud_db_name: "nextcloud"

# List of all supported PostgreSQL versions per Nextcloud major release.
# Based on: https://docs.nextcloud.com/server/stable/admin_manual/installation/system_requirements.html
nextcloud_postgresql_requirements:
  '20': ['9.5', '9.6', '10', '11']
  '21': ['9.6', '10', '11', '12', '13']
  '22': ['9.6', '10', '11', '12', '13']
  '23': ['9.6', '10', '11', '12', '13']
  '24': ['10', '11', '12', '13', '14']
  '25': ['10', '11', '12', '13', '14', '15']
  '26': ['10', '11', '12', '13', '14', '15']
  '27': ['10', '11', '12', '13', '14', '15']
  '28': ['10', '11', '12', '13', '14', '15']
  '29': ['10', '11', '12', '13', '14', '15', '16']
  '30': ['12', '13', '14', '15', '16']
  '31': ['13', '14', '15', '16', '17']
  '32': ['13', '14', '15', '16', '17']
  '33': ['14', '15', '16', '17', '18']

# Nextcloud version path the role will follow.
nextcloud_upgrade_path:
- 20.0.14
- 21.0.9
- 22.2.10
- 23.0.12
- 24.0.12
- 25.0.13
- 26.0.13
- 27.1.11
- 28.0.14
- 29.0.16
- 30.0.17
- 31.0.14 # EOL
- 32.0.10 # https://nextcloud.com/changelog/#latest32
- 33.0.4  # https://nextcloud.com/changelog/#latest33

# References:
#   - https://nextcloud.com/changelog/
#   - https://docs.nextcloud.com/server/latest/admin_manual/maintenance/upgrade.html
#   - https://docs.nextcloud.com/server/latest/admin_manual/maintenance/manual_upgrade.html
